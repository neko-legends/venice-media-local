<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venice Media Local</title>
    <link rel="preload" href="/app-icon.png" as="image" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1f22;
        color: #dbdee1;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #1e1f22;
      }

      .boot-splash {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        background: #1e1f22;
      }

      .boot-splash-inner {
        display: grid;
        justify-items: center;
        gap: 14px;
      }

      .boot-splash img {
        width: 88px;
        height: 88px;
        object-fit: contain;
        filter: drop-shadow(0 18px 42px rgb(0 0 0 / 0.34));
      }

      .boot-splash-title {
        font-size: 22px;
        font-weight: 700;
      }

      .boot-splash-status {
        color: #9aa0aa;
        font-size: 13px;
      }
    </style>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('veniceMediaLocal:theme:v1')
          const themes = new Set(['eva-dark', 'pearl-white', 'abyss-teal', 'ember', 'mosswood', 'rose-noir'])
          document.documentElement.classList.add(`theme-${themes.has(theme) ? theme : 'eva-dark'}`)
        } catch {
          document.documentElement.classList.add('theme-eva-dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash" aria-label="Venice Media Local loading">
        <div class="boot-splash-inner">
          <img src="/app-icon.png" alt="" decoding="sync" fetchpriority="high" />
          <div class="boot-splash-title">Venice Media Local</div>
          <div class="boot-splash-status">Loading...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
